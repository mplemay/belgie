name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  CARGO_PROFILE_DEV_DEBUG: "0"
  CARGO_PROFILE_TEST_DEBUG: "0"

jobs:
  prek:
    name: lint
    runs-on: ubuntu-latest
    env:
      CARGO_NET_GIT_FETCH_WITH_CLI: "true"
      CARGO_TARGET_DIR: ${{ github.workspace }}/target
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          prefix-key: v1-rust-target
          shared-key: ubuntu-latest
          cache-bin: false
          cache-targets: true
          save-if: false

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - name: Install @belgie/mcp dependencies
        working-directory: packages/mcp
        run: npm ci

      - name: Install @belgie/render dependencies
        working-directory: packages/render
        run: npm ci

      - name: Install tanstack example frontend dependencies
        working-directory: examples/ui/tanstack
        run: |
          uv sync
          uv run belgie install

      - uses: j178/prek-action@bdca6f102f98e2b4c7029491a53dfd366469e33d # v2.0.4

  test-python:
    name: test (python ${{ matrix.python-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    env:
      CARGO_NET_GIT_FETCH_WITH_CLI: "true"
      CARGO_TARGET_DIR: ${{ github.workspace }}/target
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Enable Windows long paths
        if: runner.os == 'Windows'
        run: git config --global core.longpaths true

      - name: Install Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          prefix-key: v1-rust-target
          shared-key: ${{ matrix.os }}
          cache-bin: false
          cache-targets: true
          save-if: ${{ github.ref == 'refs/heads/main' && matrix.python-version == '3.12' }}

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - name: Test @belgie/mcp
        working-directory: packages/mcp
        run: |
          npm ci
          npm test

      - name: Test @belgie/render
        working-directory: packages/render
        run: |
          npm ci
          npm test

      - name: Run tests
        run: uv run pytest

  test-rust:
    name: test (rust, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    env:
      CARGO_NET_GIT_FETCH_WITH_CLI: "true"
      CARGO_TARGET_DIR: ${{ github.workspace }}/target
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Enable Windows long paths
        if: runner.os == 'Windows'
        run: git config --global core.longpaths true

      - name: Install Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          prefix-key: v1-rust-target
          shared-key: ${{ matrix.os }}
          cache-bin: false
          cache-targets: true
          save-if: false

      - name: Run Rust tests
        run: cargo test --package belgie --all-targets
