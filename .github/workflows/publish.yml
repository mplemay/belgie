name: publish

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish (vX.Y.Z)
        required: true
        type: string

permissions:
  contents: read

jobs:
  check:
    name: validate release tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.release.outputs.tag }}
      tag_commit: ${{ steps.release.outputs.tag_commit }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Validate release tag
        id: release
        env:
          TAG_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.event.release.tag_name }}
        run: |
          set -euo pipefail

          if [[ ! "$TAG_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Release tag must use stable vX.Y.Z format."
            exit 1
          fi

          tag_commit="$(git rev-list -n 1 "$TAG_NAME")"
          if ! git merge-base --is-ancestor "$tag_commit" origin/main; then
            echo "::error::Release tag is not on the main branch."
            exit 1
          fi

          version="${TAG_NAME#v}"
          status="$(curl --silent --show-error --output /dev/null --write-out "%{http_code}" "https://pypi.org/pypi/belgie/${version}/json")"
          case "$status" in
            404)
              ;;
            200)
              echo "::warning::belgie $version already exists on PyPI; publish will skip already-uploaded files."
              ;;
            *)
              echo "::error::Failed to check PyPI for belgie $version (HTTP $status)."
              exit 1
              ;;
          esac

          echo "tag=$TAG_NAME" >> "$GITHUB_OUTPUT"
          echo "tag_commit=$tag_commit" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

  build:
    name: build wheel (${{ matrix.target }})
    needs: check
    runs-on: ${{ matrix.runner }}
    env:
      CARGO_NET_GIT_FETCH_WITH_CLI: "true"
      CARGO_TARGET_DIR: ${{ github.workspace }}/target
      VERSION: ${{ needs.check.outputs.version }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            manylinux: "2_28"
          - runner: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            manylinux: "2_28"
          - runner: macos-15-intel
            target: x86_64-apple-darwin
            manylinux: ""
          - runner: macos-latest
            target: aarch64-apple-darwin
            manylinux: ""
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            manylinux: ""
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ needs.check.outputs.tag_commit }}
          persist-credentials: false

      - name: Enable Windows long paths
        if: runner.os == 'Windows'
        run: git config --global core.longpaths true

      - name: Install Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: publish-${{ matrix.target }}
          workspaces: . -> target
          cache-bin: false
          lookup-only: true
          save-if: false

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: "3.12"
          enable-cache: false

      - name: Set release version
        shell: bash
        run: |
          set -euo pipefail

          uv version "$VERSION" --frozen

          uv run --no-project --python 3.12 python - <<'PY'
          from pathlib import Path
          import os
          import re
          import tomllib

          version = os.environ["VERSION"]


          def replace_version_in_named_block(path: str, header_pattern: str, name: str) -> None:
              file_path = Path(path)
              text = file_path.read_text()
              header = re.search(header_pattern, text, flags=re.MULTILINE)
              if header is None:
                  raise SystemExit(f"{path} is missing block for {name}")

              next_block = re.search(r"\n(?:\[\[package\]\]|\[[^\]\n]+\])", text[header.end() :])
              block_end = len(text) if next_block is None else header.end() + next_block.start()
              block = text[header.start() : block_end]
              updated_block, count = re.subn(
                  r'(?m)^version = "[^"]+"$',
                  f'version = "{version}"',
                  block,
                  count=1,
              )
              if count != 1:
                  raise SystemExit(f"{path} block for {name} is missing exactly one version")

              file_path.write_text(text[: header.start()] + updated_block + text[block_end:])


          replace_version_in_named_block(
              "Cargo.toml",
              r'(?m)^\[package\]\nname = "belgie"$',
              "belgie",
          )
          replace_version_in_named_block(
              "Cargo.lock",
              r'(?ms)^\[\[package\]\]\nname = "belgie"$',
              "belgie",
          )
          replace_version_in_named_block(
              "uv.lock",
              r'(?ms)^\[\[package\]\]\nname = "belgie"$',
              "belgie",
          )

          pyproject = tomllib.loads(Path("pyproject.toml").read_text())
          cargo = tomllib.loads(Path("Cargo.toml").read_text())
          cargo_lock = tomllib.loads(Path("Cargo.lock").read_text())
          uv_lock = tomllib.loads(Path("uv.lock").read_text())

          actual = {
              "pyproject.toml": pyproject["project"]["version"],
              "Cargo.toml": cargo["package"]["version"],
          }
          for package in cargo_lock["package"]:
              if package["name"] == "belgie":
                  actual["Cargo.lock"] = package["version"]
                  break
          for package in uv_lock["package"]:
              if package["name"] == "belgie":
                  actual["uv.lock"] = package["version"]
                  break

          missing = {"Cargo.lock", "uv.lock"} - actual.keys()
          if missing:
              raise SystemExit(f"missing belgie package entries: {sorted(missing)}")

          mismatched = {name: found for name, found in actual.items() if found != version}
          if mismatched:
              raise SystemExit(f"release version mismatch: {mismatched}")
          PY

          cargo metadata --locked --format-version 1 --no-deps >/dev/null

      - name: Set up QEMU
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0
        with:
          platforms: arm64

      - name: Build wheel
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1.51.0
        with:
          maturin-version: v1.14.0
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux }}
          before-script-linux: |
            if command -v dnf >/dev/null; then
              dnf install -y clang clang-devel glibc-devel
            elif command -v yum >/dev/null; then
              yum install -y clang clang-devel glibc-devel
            elif command -v apt-get >/dev/null; then
              apt-get update
              apt-get install -y clang libclang-dev libc6-dev
            else
              echo "::error::No supported package manager found for installing clang."
              exit 1
            fi

            export LIBCLANG_PATH="$(llvm-config --libdir)"

            if [[ "${{ matrix.target }}" == "aarch64-unknown-linux-gnu" ]]; then
              sysroot="$(aarch64-unknown-linux-gnu-gcc -print-sysroot)"
              export BINDGEN_EXTRA_CLANG_ARGS="--sysroot=$sysroot -I$sysroot/usr/include -I$sysroot/usr/include/aarch64-linux-gnu"
            fi
          args: --release --locked --compatibility pypi --out dist

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: wheel-${{ matrix.target }}
          path: dist/*.whl

  sdist:
    name: build source distribution
    needs: check
    runs-on: ubuntu-latest
    env:
      CARGO_NET_GIT_FETCH_WITH_CLI: "true"
      CARGO_TARGET_DIR: ${{ github.workspace }}/target
      VERSION: ${{ needs.check.outputs.version }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ needs.check.outputs.tag_commit }}
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: publish-sdist
          workspaces: . -> target
          cache-bin: false
          lookup-only: true
          save-if: false

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: "3.12"
          enable-cache: false

      - name: Set release version
        shell: bash
        run: |
          set -euo pipefail

          uv version "$VERSION" --frozen

          uv run --no-project --python 3.12 python - <<'PY'
          from pathlib import Path
          import os
          import re
          import tomllib

          version = os.environ["VERSION"]


          def replace_version_in_named_block(path: str, header_pattern: str, name: str) -> None:
              file_path = Path(path)
              text = file_path.read_text()
              header = re.search(header_pattern, text, flags=re.MULTILINE)
              if header is None:
                  raise SystemExit(f"{path} is missing block for {name}")

              next_block = re.search(r"\n(?:\[\[package\]\]|\[[^\]\n]+\])", text[header.end() :])
              block_end = len(text) if next_block is None else header.end() + next_block.start()
              block = text[header.start() : block_end]
              updated_block, count = re.subn(
                  r'(?m)^version = "[^"]+"$',
                  f'version = "{version}"',
                  block,
                  count=1,
              )
              if count != 1:
                  raise SystemExit(f"{path} block for {name} is missing exactly one version")

              file_path.write_text(text[: header.start()] + updated_block + text[block_end:])


          replace_version_in_named_block(
              "Cargo.toml",
              r'(?m)^\[package\]\nname = "belgie"$',
              "belgie",
          )
          replace_version_in_named_block(
              "Cargo.lock",
              r'(?ms)^\[\[package\]\]\nname = "belgie"$',
              "belgie",
          )
          replace_version_in_named_block(
              "uv.lock",
              r'(?ms)^\[\[package\]\]\nname = "belgie"$',
              "belgie",
          )

          pyproject = tomllib.loads(Path("pyproject.toml").read_text())
          cargo = tomllib.loads(Path("Cargo.toml").read_text())
          cargo_lock = tomllib.loads(Path("Cargo.lock").read_text())
          uv_lock = tomllib.loads(Path("uv.lock").read_text())

          actual = {
              "pyproject.toml": pyproject["project"]["version"],
              "Cargo.toml": cargo["package"]["version"],
          }
          for package in cargo_lock["package"]:
              if package["name"] == "belgie":
                  actual["Cargo.lock"] = package["version"]
                  break
          for package in uv_lock["package"]:
              if package["name"] == "belgie":
                  actual["uv.lock"] = package["version"]
                  break

          missing = {"Cargo.lock", "uv.lock"} - actual.keys()
          if missing:
              raise SystemExit(f"missing belgie package entries: {sorted(missing)}")

          mismatched = {name: found for name, found in actual.items() if found != version}
          if mismatched:
              raise SystemExit(f"release version mismatch: {mismatched}")
          PY

          cargo metadata --locked --format-version 1 --no-deps >/dev/null

      - name: Build source distribution
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1.51.0
        with:
          command: sdist
          maturin-version: v1.14.0
          args: --out dist

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sdist
          path: dist/*.tar.gz

  publish:
    name: publish to PyPI
    needs: [build, sdist, check]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/belgie
    permissions:
      contents: read
      id-token: write
    env:
      VERSION: ${{ needs.check.outputs.version }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ needs.check.outputs.tag_commit }}
          persist-credentials: false

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: false

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
          merge-multiple: true

      - name: Validate distributions
        shell: bash
        run: |
          set -euo pipefail

          wheel_count="$(find dist -maxdepth 1 -type f -name 'belgie-*.whl' | wc -l | tr -d ' ')"
          sdist_count="$(find dist -maxdepth 1 -type f -name 'belgie-*.tar.gz' | wc -l | tr -d ' ')"

          if [[ "$wheel_count" != "5" ]]; then
            echo "::error::Expected 5 wheels, found $wheel_count."
            find dist -maxdepth 1 -type f -print
            exit 1
          fi

          if [[ "$sdist_count" != "1" ]]; then
            echo "::error::Expected 1 source distribution, found $sdist_count."
            find dist -maxdepth 1 -type f -print
            exit 1
          fi

          for artifact in dist/*; do
            filename="$(basename "$artifact")"
            if [[ "$filename" != belgie-"$VERSION"-* && "$filename" != belgie-"$VERSION".tar.gz ]]; then
              echo "::error::Unexpected distribution filename: $filename"
              exit 1
            fi
          done

      - name: Check distributions
        run: uvx twine check --strict dist/*

      - name: Publish to PyPI
        run: uv publish --trusted-publishing always --check-url https://pypi.org/simple/ dist/*
