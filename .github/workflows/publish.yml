name: publish

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish (vX.Y.Z)
        required: true
        type: string
      publish_target:
        description: Where to publish
        type: choice
        options: [pypi, testpypi]
        default: pypi
      upload_to_release:
        description: Attach wheels to the GitHub Release (workflow_dispatch only)
        type: boolean
        default: false

permissions:
  contents: read

env:
  EXPECTED_WHEELS: "8"

jobs:
  check:
    name: validate release tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.release.outputs.tag }}
      tag_commit: ${{ steps.release.outputs.tag_commit }}
      version: ${{ steps.release.outputs.version }}
      publish_target: ${{ steps.release.outputs.publish_target }}
      publish_url: ${{ steps.release.outputs.publish_url }}
      upload_to_release: ${{ steps.release.outputs.upload_to_release }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Validate release tag
        id: release
        env:
          TAG_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.event.release.tag_name }}
          INPUT_PUBLISH_TARGET: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_target || 'pypi' }}
          INPUT_UPLOAD_TO_RELEASE: ${{ github.event_name == 'workflow_dispatch' && inputs.upload_to_release || 'false' }}
        run: |
          set -euo pipefail

          if [[ ! "$TAG_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Release tag must use stable vX.Y.Z format."
            exit 1
          fi

          tag_commit="$(git rev-list -n 1 "$TAG_NAME")"
          if ! git merge-base --is-ancestor "$tag_commit" origin/main; then
            echo "::error::Release tag is not on the main branch."
            exit 1
          fi

          version="${TAG_NAME#v}"

          if [[ "${{ github.event_name }}" == "release" ]]; then
            publish_target="pypi"
            upload_to_release="true"
          else
            publish_target="$INPUT_PUBLISH_TARGET"
            upload_to_release="$INPUT_UPLOAD_TO_RELEASE"
          fi

          if [[ "$publish_target" == "testpypi" ]]; then
            probe_url="https://test.pypi.org/pypi/belgie/${version}/json"
            publish_url="https://test.pypi.org/p/belgie"
          else
            probe_url="https://pypi.org/pypi/belgie/${version}/json"
            publish_url="https://pypi.org/p/belgie"
          fi

          status="$(curl --silent --show-error --output /dev/null --write-out "%{http_code}" "$probe_url")"
          case "$status" in
            404)
              ;;
            200)
              echo "::warning::belgie $version already exists on $publish_target; publish will skip already-uploaded files."
              ;;
            *)
              echo "::error::Failed to check $publish_target for belgie $version (HTTP $status)."
              exit 1
              ;;
          esac

          echo "tag=$TAG_NAME" >> "$GITHUB_OUTPUT"
          echo "tag_commit=$tag_commit" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "publish_target=$publish_target" >> "$GITHUB_OUTPUT"
          echo "publish_url=$publish_url" >> "$GITHUB_OUTPUT"
          echo "upload_to_release=$upload_to_release" >> "$GITHUB_OUTPUT"

  build:
    name: build wheel (${{ matrix.target }})
    needs: check
    runs-on: ${{ matrix.runner }}
    env:
      CARGO_NET_GIT_FETCH_WITH_CLI: "true"
      CARGO_TARGET_DIR: ${{ github.workspace }}/target
      VERSION: ${{ needs.check.outputs.version }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            manylinux: "2_28"
          - runner: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            manylinux: "2_28"
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-musl
            manylinux: musllinux_1_2
          - runner: ubuntu-latest
            target: aarch64-unknown-linux-musl
            manylinux: musllinux_1_2
          - runner: macos-15-intel
            target: x86_64-apple-darwin
            manylinux: ""
          - runner: macos-latest
            target: aarch64-apple-darwin
            manylinux: ""
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            manylinux: ""
          - runner: windows-11-arm
            target: aarch64-pc-windows-msvc
            manylinux: ""
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ needs.check.outputs.tag_commit }}
          persist-credentials: false

      - name: Enable Windows long paths
        if: runner.os == 'Windows'
        run: git config --global core.longpaths true

      - name: Install Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: publish-${{ matrix.target }}
          workspaces: . -> target
          cache-bin: false
          lookup-only: true
          save-if: false

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: "3.12"
          enable-cache: false

      - name: Set release version
        shell: bash
        run: |
          set -euo pipefail

          uv version "$VERSION" --frozen
          uv run --no-project --python 3.12 python .github/scripts/set-release-version.py
          cargo metadata --locked --format-version 1 --no-deps >/dev/null

      - name: Set up QEMU
        if: matrix.target == 'aarch64-unknown-linux-gnu' || matrix.target == 'aarch64-unknown-linux-musl'
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0
        with:
          platforms: arm64

      - name: Build wheel
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1.51.0
        with:
          maturin-version: v1.14.0
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux }}
          before-script-linux: |
            if command -v dnf >/dev/null; then
              dnf install -y clang clang-devel glibc-devel
            elif command -v yum >/dev/null; then
              yum install -y clang clang-devel glibc-devel
            elif command -v apt-get >/dev/null; then
              apt-get update
              apt-get install -y clang libclang-dev libc6-dev
            else
              echo "::error::No supported package manager found for installing clang."
              exit 1
            fi

            export LIBCLANG_PATH="$(llvm-config --libdir)"

            if [[ "${{ matrix.target }}" == *-musl ]]; then
              export RUSTFLAGS="${RUSTFLAGS:+$RUSTFLAGS }-C target-feature=-crt-static"
            fi

            if [[ "${{ matrix.target }}" == "aarch64-unknown-linux-gnu" ]]; then
              # deno_snapshots build.rs build-depends on deno_runtime for the HOST
              # during cross-compilation, which pulls in aws-lc-sys. The manylinux
              # cross image sets TARGET_CC to the aarch64 cross compiler; aws-lc-sys
              # incorrectly applies that to CC_x86_64_unknown_linux_gnu for host tests.
              unset TARGET_CC TARGET_CXX

              sysroot="$(aarch64-unknown-linux-gnu-gcc -print-sysroot)"
              export BINDGEN_EXTRA_CLANG_ARGS="--sysroot=$sysroot -I$sysroot/usr/include -I$sysroot/usr/include/aarch64-linux-gnu"
            elif [[ "${{ matrix.target }}" == "aarch64-unknown-linux-musl" ]]; then
              unset TARGET_CC TARGET_CXX

              sysroot="$(aarch64-linux-musl-gcc -print-sysroot 2>/dev/null || true)"
              if [[ -n "$sysroot" ]]; then
                export BINDGEN_EXTRA_CLANG_ARGS="--sysroot=$sysroot -I$sysroot/usr/include"
              fi
            fi
          args: --release --locked --compatibility pypi --out dist

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: wheel-${{ matrix.target }}
          path: dist/*.whl

  sdist:
    name: build source distribution
    needs: check
    runs-on: ubuntu-latest
    env:
      CARGO_NET_GIT_FETCH_WITH_CLI: "true"
      CARGO_TARGET_DIR: ${{ github.workspace }}/target
      VERSION: ${{ needs.check.outputs.version }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ needs.check.outputs.tag_commit }}
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: publish-sdist
          workspaces: . -> target
          cache-bin: false
          lookup-only: true
          save-if: false

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: "3.12"
          enable-cache: false

      - name: Set release version
        shell: bash
        run: |
          set -euo pipefail

          uv version "$VERSION" --frozen
          uv run --no-project --python 3.12 python .github/scripts/set-release-version.py
          cargo metadata --locked --format-version 1 --no-deps >/dev/null

      - name: Build source distribution
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1.51.0
        with:
          command: sdist
          maturin-version: v1.14.0
          args: --out dist

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sdist
          path: dist/*.tar.gz

  publish:
    name: publish to ${{ needs.check.outputs.publish_target }}
    needs: [build, sdist, check]
    runs-on: ubuntu-latest
    environment:
      name: ${{ needs.check.outputs.publish_target }}
      url: ${{ needs.check.outputs.publish_url }}
    permissions:
      contents: read
      id-token: write
    env:
      VERSION: ${{ needs.check.outputs.version }}
      PUBLISH_TARGET: ${{ needs.check.outputs.publish_target }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ needs.check.outputs.tag_commit }}
          persist-credentials: false

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: false

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
          merge-multiple: true

      - name: Validate distributions
        shell: bash
        run: bash .github/scripts/validate-distributions.sh

      - name: Check distributions
        run: uvx twine check --strict dist/*

      - name: Publish to PyPI
        if: env.PUBLISH_TARGET == 'pypi'
        run: uv publish --trusted-publishing always --check-url https://pypi.org/simple/ dist/*

      - name: Publish to TestPyPI
        if: env.PUBLISH_TARGET == 'testpypi'
        run: >-
          uv publish --trusted-publishing always
          --publish-url https://test.pypi.org/legacy/
          --check-url https://test.pypi.org/simple/
          dist/*

  upload-release-assets:
    name: upload release assets
    needs: [build, sdist, check]
    if: needs.check.outputs.upload_to_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      VERSION: ${{ needs.check.outputs.version }}
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
          merge-multiple: true

      - name: Validate distributions
        shell: bash
        run: bash .github/scripts/validate-distributions.sh

      - name: Upload release assets
        uses: softprops/action-gh-release@be5bf660704cac670d937e271e1a7533aa0617c9 # v2.2.0
        with:
          tag_name: ${{ needs.check.outputs.tag }}
          files: dist/*
          fail_on_unmatched_files: true
