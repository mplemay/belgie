name: Publish

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: pypi
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Check tag is on main
        id: tag_check
        run: |
          git fetch origin main --tags --force
          TAG_COMMIT="$(git rev-list -n 1 "refs/tags/${{ github.event.release.tag_name }}")"
          if git merge-base --is-ancestor "$TAG_COMMIT" "origin/main"; then
            echo "on_main=true" >> "$GITHUB_OUTPUT"
          else
            echo "on_main=false" >> "$GITHUB_OUTPUT"
            echo "Tag is not on main; skipping publish."
          fi
      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
      - name: Set version
        id: version
        if: steps.tag_check.outputs.on_main == 'true'
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
      - name: Prepare versions
        if: steps.tag_check.outputs.on_main == 'true'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          for package in \
            belgie-proto \
            belgie-core \
            belgie-alchemy \
            belgie-mcp \
            belgie-oauth \
            belgie-oauth-server \
            belgie-organization \
            belgie-team \
            belgie-sso \
            belgie-stripe \
            belgie
          do
            uv version --package "$package" "$VERSION"
          done

          for file in pyproject.toml packages/*/pyproject.toml; do
            sed -i -E "s/(belgie-[a-z-]+)==0\\.1\\.0/\\1==$VERSION/g" "$file"
          done
      - name: Build all packages
        if: steps.tag_check.outputs.on_main == 'true'
        run: uv build --all-packages
      - name: Publish
        if: steps.tag_check.outputs.on_main == 'true'
        run: uv publish dist/*
