[project]
name = "belgie-sso"
version = "0.1.0"
description = "Enterprise OIDC SSO for Belgie"
readme = "README.md"
authors = [
    { name = "Matt LeMay", email = "mplemay@users.noreply.github.com" }
]
requires-python = ">=3.12,<3.15"
dependencies = [
    "belgie-core==0.1.0",
    "belgie-organization==0.1.0",
    "belgie-proto==0.1.0",
    "dnspython>=2.7.0",
    "fastapi>=0.100",
    "httpx>=0.24",
    "pydantic>=2.0",
    "pydantic-settings>=2.0",
]

[build-system]
requires = ["uv_build>=0.11.0,<0.12.0"]
build-backend = "uv_build"

[tool.uv.build-backend]
source-exclude = ["**/__tests__/**"]
