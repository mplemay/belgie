[project]
name = "belgie-testing"
version = "0.1.0"
description = "Testing utilities plugin for Belgie"
readme = "README.md"
authors = [
    { name = "Matt LeMay", email = "mplemay@users.noreply.github.com" }
]
requires-python = ">=3.12,<3.15"
dependencies = [
    "belgie-core==0.1.0",
    "belgie-proto==0.1.0",
    "fastapi>=0.100",
]

[build-system]
requires = ["uv_build>=0.11.0,<0.12.0"]
build-backend = "uv_build"

[tool.uv.build-backend]
source-exclude = ["**/__tests__/**"]
