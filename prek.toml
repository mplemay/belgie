# Configuration file for `prek`, a git hook framework written in Rust.
# See https://prek.j178.dev for more information.
#:schema https://www.schemastore.org/prek.json

exclude = { glob = [".agents/**", "src/components/ui/**", "src/routeTree.gen.ts"] }

[[repos]]
repo = "builtin"
hooks = [
  # Hygiene fixers (run before local formatters)
  { id = "trailing-whitespace" },
  { id = "end-of-file-fixer" },
  { id = "mixed-line-ending", args = ["--fix=lf"] },

  # Syntax validation
  { id = "check-json", exclude = "tsconfig\\.json$" },
  { id = "check-toml" },
  { id = "check-yaml" },
  {
    id = "pretty-format-json",
    args = ["--autofix", "--no-ensure-ascii"],
  },

  # Safety guards
  { id = "check-added-large-files" },
  { id = "check-case-conflict" },
  { id = "check-merge-conflict" },
  { id = "detect-private-key" },
]

[[repos]]
repo = "local"
hooks = [
  {
    id = "uv-lock",
    name = "uv lock",
    entry = "uv lock",
    language = "python",
    files = '^(uv\.lock|pyproject\.toml|uv\.toml)$',
    pass_filenames = false,
  },
  {
    id = "ruff-check",
    name = "ruff check",
    entry = "uv run ruff check --force-exclude",
    args = ["--fix"],
    language = "python",
    types_or = [
      "python",
      "pyi",
      "jupyter",
    ],
    require_serial = true,
  },
  {
    id = "ruff-format",
    name = "ruff format",
    entry = "uv run ruff format --force-exclude",
    language = "python",
    types_or = [
      "python",
      "pyi",
      "jupyter",
    ],
    require_serial = true,
  },
  {
    id = "ty-check",
    name = "ty check",
    entry = "uv run ty check",
    args = ["src"],
    language = "python",
    types_or = [
      "python",
      "pyi",
      "jupyter",
    ],
    require_serial = true,
    pass_filenames = false,
  },
  {
    id = "rumdl-fmt",
    name = "rumdl fmt",
    entry = "uv run rumdl fmt",
    language = "python",
    types = ["markdown"],
    require_serial = true,
  },
  {
    id = "rumdl-check",
    name = "rumdl check",
    entry = "uv run rumdl check",
    language = "python",
    types = ["markdown"],
    require_serial = true,
  },
  {
    id = "zizmor",
    name = "zizmor",
    entry = "uv run zizmor",
    args = ["--no-progress"],
    language = "python",
    types = ["yaml"],
    files = '(\.github/(workflows/.*|dependabot\.ya?ml))|(action\.ya?ml)$',
    require_serial = true,
  },
]
